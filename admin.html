<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Administración - Taquiza La Rana</title>
    <link rel="stylesheet" href="css/styles.css">
    
    <style>
        /* Estilos específicos para el panel de administración */
        .admin-form-container {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            max-width: 600px;
            margin: 20px auto;
        }

        .admin-form-group {
            margin-bottom: 20px;
        }

        .admin-form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #333;
        }

        .admin-form-group input, 
        .admin-form-group select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
        }

        .admin-form-group input:focus {
            border-color: #267d46;
            outline: none;
        }

        .admin-submit-btn {
            background: #267d46;
            color: white;
            border: none;
            padding: 15px 20px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            transition: background 0.3s ease;
        }

        .admin-submit-btn:hover {
            background: #1a5730;
        }
        
        .back-btn {
             background: #666;
             margin-bottom: 20px;
        }
    </style>
</head>
<body>

    <div class="container" style="margin-top: 50px; padding-bottom: 50px;">
        <div class="header">
            <img src="src/images/LOGO.jpg" class="logo" style="max-width: 200px;">
            <h1>Panel de Administración</h1>
            <p>Gestión del Menú - Taquiza La Rana</p>
        </div>

        <div style="text-align: center; margin-top: 20px;">
            <button onclick="window.location.href='index.html'" class="menu-btn back-btn">
                ⬅️ Volver a la Tienda
            </button>
        </div>

        <div class="admin-form-container">
            <h2 style="margin-bottom: 20px; color: #333; border-bottom: 2px solid #f5576c; padding-bottom: 10px;">
                ➕ Agregar Nuevo Platillo
            </h2>
            
            <form id="addPlatilloForm">
                <div class="admin-form-group">
                    <label for="nombrePlatillo">Nombre del Platillo</label>
                    <input type="text" id="nombrePlatillo" placeholder="Ej: Tacos al Pastor" required>
                </div>

                <div class="admin-form-group">
                    <label for="precioPlatillo">Precio ($)</label>
                    <input type="number" id="precioPlatillo" placeholder="Ej: 80" required>
                </div>

                <div class="admin-form-group">
                    <label for="categoriaPlatillo">Categoría</label>
                    <select id="categoriaPlatillo">
                        <option value="PLATILLOS">Platillos</option>
                        <option value="BEBIDAS">Bebidas</option>
                    </select>
                </div>

                <div class="admin-form-group">
                    <label for="imagenPlatillo">Nombre de la Imagen (debe estar en src/images/)</label>
                    <input type="text" id="imagenPlatillo" placeholder="Ej: tacos.jpg" required>
                </div>

                <button type="submit" class="admin-submit-btn">Guardar Platillo</button>
            </form>
        </div>
    </div>

    <script type="module">
        // 1. Importar las funciones necesarias de Firebase
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // 2. AQUÍ PEGARÁS LA CONFIGURACIÓN DE TU PROYECTO (lo haremos en el siguiente paso)
        const firebaseConfig = {
            apiKey: "AIzaSyBN39V3BfL29_jh8SnGD43xdJzwm_2FolM",
            authDomain: "taquiza-web.firebaseapp.com",
            projectId: "taquiza-web",
            storageBucket: "taquiza-web.firebasestorage.app",
            messagingSenderId: "475601236604",
            appId: "1:475601236604:web:775b368768e9822789cff9"
        };

        // 3. Inicializar Firebase y Firestore
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // 4. Lógica del formulario
        document.getElementById('addPlatilloForm').addEventListener('submit', async (e) => {
            e.preventDefault(); // Evitar que la página se recargue

            // Obtener los valores del formulario
            const nombre = document.getElementById('nombrePlatillo').value;
            const precio = Number(document.getElementById('precioPlatillo').value);
            const categoria = document.getElementById('categoriaPlatillo').value;
            const imagen = document.getElementById('imagenPlatillo').value;

            try {
                // Aquí es donde añadimos el documento a Firestore (La "C" del CRUD)
                // Descomenta esto cuando tengamos la configuración lista   
                const docRef = await addDoc(collection(db, "menu_items"), {
                    nombre: nombre,
                    precio: precio,
                    categoria: categoria,
                    imagen_url: "src/images/" + imagen,
                    fecha_creacion: new Date()
                });
                console.log("Documento escrito con ID: ", docRef.id);
                
                alert("Éxito!: Platillo '" + nombre + "' agregado correctamente.");
                document.getElementById('addPlatilloForm').reset(); // Limpiar el formulario
                
            } catch (e) {
                console.error("Error añadiendo documento: ", e);
                alert("Hubo un error al guardar el platillo.");
            }
        });
    </script>
</body>
</html>
