<!DOCTYPE html>
<html lang="es">
<head>
    <meta name="referrer" content="strict-origin-when-cross-origin">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Menú Digital - Taquiza La Rana</title>
    
    <link rel="stylesheet" href="css/styles.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <script src="js/crm.js?v=6"></script>
</head>

<body>

    <div class="menu-dropdown">
        <button onclick="toggleMenu()" class="menu-btn">
            ☰
        </button>
        <div id="dropdownMenu" class="dropdown-content">
            <button onclick="goToProfile()">👤 Perfil</button>
            <button onclick="goToSettings()">⚙️ Ajustes</button>
            <button onclick="goToAdmin()">🛠️ Administrador</button>
        </div>
    </div>

    <div class="user-dropdown" style="position: fixed; top: 20px; right: 20px; z-index: 3000;">
        <button onclick="openLoginModal()" class="menu-btn" id="userLoginBtn" style="background: #267d46;">
            👤 Acceder
        </button>
    </div>

    <div class="container">
        <div class="header">
            <img src="src/images/LOGO.jpg" class="logo">
            <h1>Taquiza La Rana</h1>
            <p>Menú Digital - ¡Ordena Fácil!</p>
        </div>

        <div class="search-container">
            <input type="text" 
                   id="searchInput" 
                   placeholder="🔎 Buscar..." 
                   onkeyup="searchProducts()">
        </div>

        <div class="menu-container">
            <div class="category">
                <h2 class="category-title">⭐ Recomendados para ti</h2>
                <div class="products" id="recommendedProducts">
                </div>
            </div>

            <div class="category">
                <h2 class="category-title">🍽️ PLATILLOS</h2>
                <div class="products" id="platillos-container">
                    <p>Cargando deliciosos platillos...</p>
                </div>
            </div>

            <div class="category">
                <h2 class="category-title">🥤 BEBIDAS</h2>
                <div class="products" id="bebidas-container">
                    <p>Cargando bebidas refrescantes...</p>
                </div>
            </div>
        </div>
    </div>
    
    <script src="js/cart.js"></script>

    <div class="cart-float" onclick="toggleCart()">
        🛒 Mi Pedido <span class="cart-badge" id="cartCount">0</span>
    </div>

    <div class="cart-modal" id="cartModal">
        <div class="cart-content">
            <div class="cart-header">
                <h2>🛒 Mi Pedido</h2>
                <button class="close-btn" onclick="toggleCart()">×</button>
            </div>
            
            <div id="cartItems"></div>
            
            <div class="cart-total" id="cartTotal">
                Total: $0
            </div>

            <div id="orderStatus" style="display:none; text-align:center; margin: 15px 0; font-size: 1.2em; font-weight:bold; color: #267d46;">
                ⏳ Procesando...
            </div>
            
            <button class="whatsapp-btn" onclick="sendToWhatsApp()">
                📱 Ordenar por WhatsApp
            </button>
            
            <button class="web-order-btn" onclick="processWebOrder()" 
                style="width: 100%; padding: 18px; background: #f0ad4e; color: #333; border: none; border-radius: 10px; font-size: 1.2em; font-weight: bold; cursor: pointer; margin-top: 10px; transition: all 0.3s ease;">
                💳 Pagar en Línea (Acumula Puntos)
            </button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, getDocs, doc, getDoc, updateDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBN39V3BfL29_jh8SnGD43xdJzwm_2FolM",
            authDomain: "taquiza-web.firebaseapp.com",
            projectId: "taquiza-web",
            storageBucket: "taquiza-web.firebasestorage.app",
            messagingSenderId: "475601236604",
            appId: "1:475601236604:web:775b368768e9822789cff9"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        async function cargarMenu() {
            try {
                const querySnapshot = await getDocs(collection(db, "menu_items"));
                const platillosContainer = document.getElementById("platillos-container");
                const bebidasContainer = document.getElementById("bebidas-container");

                platillosContainer.innerHTML = "";
                bebidasContainer.innerHTML = "";

                querySnapshot.forEach((documento) => {
                    const data = documento.data(); 
                    
                    const productHTML = `
                        <div class="product-card">
                            <div class="product-image">
                                <img src="${data.imagen_url}">
                            </div>
                            <div class="product-name">${data.nombre}</div>
                            <div class="product-price">$${data.precio}</div>
                            <button class="add-btn"
                                onclick="addToCart('${data.nombre}', ${data.precio})">
                                Agregar
                            </button>
                        </div>
                    `;

                    if(data.categoria === "PLATILLOS") {
                        platillosContainer.innerHTML += productHTML;
                    } else if (data.categoria === "BEBIDAS") {
                        bebidasContainer.innerHTML += productHTML;
                    }
                });
            } catch (error) {
                console.error("Error al cargar el menú:", error);
                document.getElementById("platillos-container").innerHTML = "<p>Error al cargar el menú.</p>";
            }
        }

        cargarMenu();

        // PUENTE CRM
        window.guardarPedidoEnCRM = async (carritoTerminado, totalPagado) => {
            const email = localStorage.getItem("customerEmail");
            const nombre = localStorage.getItem("customerName");
            
            if (!email) return;

            const clienteRef = doc(db, "clientes", email);
            
            try {
                const clienteSnap = await getDoc(clienteRef);
                const puntosGanados = Math.floor(totalPagado / 10);
                const fechaActual = new Date().toLocaleDateString("es-MX") + " " + new Date().toLocaleTimeString("es-MX", {hour: '2-digit', minute:'2-digit'});
                const detallePedido = carritoTerminado.map(item => `${item.quantity}x ${item.name}`).join(", ");

                const nuevoPedido = {
                    fecha: fechaActual,
                    detalle: detallePedido,
                    total: totalPagado
                };

                if (clienteSnap.exists()) {
                    const datos = clienteSnap.data();
                    const puntosActuales = datos.puntos || 0;
                    const historialActual = datos.historial || [];
                    
                    historialActual.push(nuevoPedido);
                    
                    await updateDoc(clienteRef, {
                        puntos: puntosActuales + puntosGanados,
                        historial: historialActual
                    });
                } else {
                    await setDoc(clienteRef, {
                        nombre: nombre,
                        email: email,
                        puntos: puntosGanados,
                        suscrito_promos: localStorage.getItem("promoSubscribed") === "true",
                        historial: [nuevoPedido]
                    });
                }
                
                Swal.fire({
                    title: '¡Pago Exitoso!',
                    text: `¡Gracias por tu compra! Has ganado ${puntosGanados} Taqui-Puntos.`,
                    icon: 'success',
                    confirmButtonText: '¡Genial!',
                    confirmButtonColor: '#267d46'
                });
                
            } catch (error) {
                console.error("Error al registrar en CRM:", error);
                Swal.fire('Error', 'No pudimos registrar tus puntos.', 'error');
            }
        };
    </script>
</body>
</html>
