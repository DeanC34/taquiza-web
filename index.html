<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Menú Digital - Taquiza La Rana</title>

<link rel="stylesheet" href="css/styles.css">

</head>

<body>

<div class="container">

<div class="header">
<img src="images/logo.jpg" width="400">
<h1>Taquiza La Rana</h1>
<p>Menú Digital - ¡Ordena Fácil!</p>
</div>

<div class="menu-container">

<div class="category">
<h2 class="category-title">MENÚ</h2>

<div class="products">

<div class="product-card">

<div class="product-image">
<img src="images/chamorro.jpg">
</div>

<div class="product-name">CHAMORRO</div>
<div class="product-price">$500</div>

<button class="add-btn"
onclick="addToCart('CHAMORRO',500)">
Agregar
</button>

</div>

</div>
</div>

</div>
</div>

<script src="js/cart.js"></script>

<!-- Botón flotante del carrito -->
<div class="cart-float" onclick="toggleCart()">
🛒 Mi Pedido <span id="cartCount">0</span>
</div>

<!-- Modal del carrito -->
<div class="cart-modal" id="cartModal">

<div class="cart-content">

<h2>Mi Pedido</h2>

<div id="cartItems"></div>

<h3 id="cartTotal">Total: $0</h3>

<button onclick="sendToWhatsApp()">
Ordenar por WhatsApp
</button>

</div>

</div>

</body>
</html>
