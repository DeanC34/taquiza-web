<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Perfil - Taquiza La Rana</title>
    <link rel="stylesheet" href="css/styles.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <style>
        .profile-container {
            padding: 20px;
        }

        .profile-header {
            text-align: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #eee;
        }

        .profile-name {
            font-size: 2em;
            color: #267d46;
            margin-bottom: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .profile-email {
            color: #666;
            font-size: 1.1em;
        }

        /* Tarjeta de Taqui-Puntos */
        .points-card {
            background: linear-gradient(135deg, #f5576c 0%, #d62f2f 100%);
            color: white;
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 10px 20px rgba(214, 47, 47, 0.3);
            margin-bottom: 30px;
        }

        .points-number {
            font-size: 4em;
            font-weight: bold;
            margin: 10px 0;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .btn-canjear {
            background: white;
            color: #d62f2f;
            border: none;
            padding: 10px 20px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 1.1em;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .btn-canjear:hover {
            transform: scale(1.05);
        }

        /* Historial y Preferencias */
        .section-title {
            color: #333;
            border-bottom: 2px solid #267d46;
            padding-bottom: 10px;
            margin-bottom: 20px;
        }

        .history-list {
            background: #f9f9f9;
            border-radius: 10px;
            padding: 15px;
            max-height: 300px;
            overflow-y: auto;
            margin-bottom: 30px;
        }

        .history-item {
            background: white;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 10px;
            border-left: 5px solid #267d46;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .promo-toggle {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #fff9fa;
            padding: 20px;
            border-radius: 10px;
            border: 1px solid #f5576c;
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 60px;
            height: 34px;
        }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #ccc;
            transition: .4s;
            border-radius: 34px;
        }
        .slider:before {
            position: absolute;
            content: "";
            height: 26px; width: 26px;
            left: 4px; bottom: 4px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }
        input:checked + .slider { background-color: #267d46; }
        input:checked + .slider:before { transform: translateX(26px); }
        
        .back-btn { background: #666; margin-bottom: 20px; }

        /* Estilos Verificación y Edición de datos */
        .verification-box {
            background: #fff3cd;
            border: 1px solid #ffeeba;
            color: #856404;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            text-align: center;
        }
        .verified-box {
            background: #d4edda;
            border: 1px solid #c3e6cb;
            color: #155724;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            text-align: center;
        }
        .edit-data-btn {
            background: #007bff;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.5em;
        }
        .edit-data-btn:hover { background: #0056b3; }
        
        /* Botón de edición de teléfono (más grande que el del nombre) */
        .edit-phone-btn {
            background: #007bff;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.9em;
            margin-left: 10px;
        }
        .edit-phone-btn:hover { background: #0056b3; }
        
        .logout-btn {
            background: #dc3545;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            display: block;
            margin: 30px auto 0;
            transition: background 0.3s;
        }
        .logout-btn:hover { background: #c82333; }
    </style>
</head>
<body>

    <div class="menu-dropdown">
        <button onclick="window.location.href='index.html'" class="menu-btn back-btn" style="background: #666;">
            ⬅️ Volver al Menú
        </button>
    </div>

    <div class="container" style="margin-top: 70px; padding-bottom: 50px;">
        <div class="profile-container">
            <div class="profile-header">
                <h1 class="profile-name" id="displayNombre">
                    <span id="textNombre">Cargando...</span>
                    <button class="edit-data-btn" onclick="editarNombre()">✏️ Editar</button>
                </h1>
                <p class="profile-email" id="displayEmail">Cargando...</p>
                <p id="displayPhone" style="color: #267d46; font-weight: bold; margin-top: 5px; display: flex; align-items: center; justify-content: center;">
                    Cargando teléfono...
                </p>
            </div>

            <div id="verificationContainer"></div>

            <div class="points-card">
                <h2>⭐ Mis Taqui-Puntos</h2>
                <div class="points-number" id="displayPuntos">0</div>
                <p>1 Punto = $10 MXN en compras</p>
                <button class="btn-canjear" onclick="canjearPuntos()">🎁 Canjear por Agua Gratis (50 pts)</button>
            </div>

            <h2 class="section-title">📦 Mi Historial de Pedidos</h2>
            <div class="history-list" id="displayHistorial">
                <p style="text-align: center; color: #666;">Cargando historial desde la nube...</p>
            </div>

            <h2 class="section-title">💌 Promociones Especiales</h2>
            <div class="promo-toggle">
                <div>
                    <h3 style="color: #333; margin-bottom: 5px;">Recibir Cupones y Ofertas</h3>
                    <p style="color: #666; font-size: 0.9em; margin: 0;">Te enviaremos descuentos exclusivos a tu correo.</p>
                </div>
                <label class="switch">
                    <input type="checkbox" id="promoSwitch">
                    <span class="slider"></span>
                </label>
            </div>

            <button class="logout-btn" onclick="cerrarSesion()">Cerrar Sesión</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, doc, getDoc, setDoc, updateDoc, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBN39V3BfL29_jh8SnGD43xdJzwm_2FolM",
            authDomain: "taquiza-web.firebaseapp.com",
            projectId: "taquiza-web",
            storageBucket: "taquiza-web.firebasestorage.app",
            messagingSenderId: "475601236604",
            appId: "1:475601236604:web:775b368768e9822789cff9"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const customerEmail = localStorage.getItem("customerEmail");
        const customerName = localStorage.getItem("customerName");

        if (!customerEmail) {
            Swal.fire('Atención', 'Debes iniciar sesión para ver tu perfil.', 'warning').then(() => {
                window.location.href = "index.html";
            });
        } else {
            // CORRECCIÓN APLICADA AQUÍ
            const primerNombre = customerName.trim().split(' '); 
            document.getElementById("textNombre").innerText = "👤 " + primerNombre;
            document.getElementById("displayEmail").innerText = customerEmail;
            
            cargarPerfilCRM();
            verificarEstadoEmail();
        }

        function verificarEstadoEmail() {
            const isVerified = localStorage.getItem("emailVerified") === "true";
            const container = document.getElementById("verificationContainer");

            if (isVerified) {
                container.innerHTML = `
                    <div class="verified-box">
                        ✅ Tu correo está verificado. ¡Ya puedes acumular Taqui-Puntos!
                    </div>
                `;
            } else {
                container.innerHTML = `
                    <div class="verification-box">
                        ⚠️ Tu correo no está verificado. No podrás acumular puntos hasta que ingreses el código que te enviamos.<br>
                        <button onclick="ingresarCodigoVerificacion()" style="margin-top: 10px; background:#856404; color:white; border:none; padding:8px 15px; border-radius:5px; cursor:pointer;">Ingresar Código</button>
                    </div>
                `;
            }
        }

        window.ingresarCodigoVerificacion = async () => {
            const { value: code } = await Swal.fire({
                title: 'Verificación de Correo',
                input: 'text',
                inputLabel: 'Ingresa el código de 6 dígitos que enviamos a tu correo.',
                inputPlaceholder: '123456',
                showCancelButton: true,
                confirmButtonColor: '#267d46',
                inputValidator: (value) => {
                    if (!value) return 'Necesitas ingresar un código';
                }
            });

            if (code) {
                const storedCode = localStorage.getItem("verifyCode");
                if (code === storedCode) {
                    localStorage.setItem("emailVerified", "true");
                    
                    try {
                        const clienteRef = doc(db, "clientes", customerEmail);
                        await updateDoc(clienteRef, { correoVerificado: true });
                    } catch (e) { console.log("Aún no hay doc en DB", e) }

                    Swal.fire('¡Verificado!', 'Tu cuenta ha sido verificada con éxito.', 'success');
                    verificarEstadoEmail();
                } else {
                    Swal.fire('Error', 'El código es incorrecto. Intenta nuevamente.', 'error');
                }
            }
        };

        window.editarNombre = async () => {
            const actual = localStorage.getItem("customerName") || "";
            const { value: newName } = await Swal.fire({
                title: 'Actualizar Nombre',
                input: 'text',
                inputValue: actual,
                inputPlaceholder: 'Ingresa tu nombre completo',
                showCancelButton: true,
                confirmButtonColor: '#267d46',
                inputValidator: (value) => {
                    if (!value) return '¡Necesitamos saber cómo llamarte!';
                }
            });

            if (newName && newName !== actual) {
                Swal.fire({ title: 'Actualizando...', allowOutsideClick: false, didOpen: () => { Swal.showLoading(); } });
                
                try {
                    const clienteRef = doc(db, "clientes", customerEmail);
                    await updateDoc(clienteRef, { nombre: newName });
                    
                    localStorage.setItem("customerName", newName);
                    // CORRECCIÓN APLICADA AQUÍ
                    const primerNombre = newName.trim().split(' ');
                    document.getElementById("textNombre").innerText = "👤 " + primerNombre;
                    
                    Swal.fire('¡Actualizado!', 'Tu nombre se guardó correctamente.', 'success');
                } catch (e) {
                    console.log("No se pudo actualizar en DB", e);
                    Swal.fire('Error', 'No pudimos actualizar tu nombre. Intenta más tarde.', 'error');
                }
            }
        };

        window.editarTelefono = async () => {
            const actual = localStorage.getItem("customerPhone") || "";
            const { value: phone } = await Swal.fire({
                title: 'Actualizar Teléfono',
                input: 'tel',
                inputValue: actual,
                inputPlaceholder: 'Ej: 9611234567',
                showCancelButton: true,
                confirmButtonColor: '#267d46',
                inputValidator: (value) => {
                    if (!value) return '¡Necesitamos tu número para los envíos!';
                }
            });

            if (phone && phone !== actual) {
                Swal.fire({ title: 'Verificando...', allowOutsideClick: false, didOpen: () => { Swal.showLoading(); } });
                
                try {
                    const clientesRef = collection(db, "clientes");
                    const q = query(clientesRef, where("telefono", "==", phone));
                    const querySnapshot = await getDocs(q);

                    let duplicado = false;
                    querySnapshot.forEach((doc) => {
                        if(doc.id !== customerEmail) {
                            duplicado = true;
                        }
                    });

                    if (duplicado) {
                        Swal.fire('Número en uso', 'Ese número de teléfono ya está registrado en otra cuenta.', 'warning');
                        return; 
                    }

                    const clienteRef = doc(db, "clientes", customerEmail);
                    await updateDoc(clienteRef, { telefono: phone });
                    
                    localStorage.setItem("customerPhone", phone);
                    document.getElementById("displayPhone").innerHTML = `📱 ${phone} <button class="edit-phone-btn" onclick="editarTelefono()">Editar</button>`;
                    Swal.fire('¡Actualizado!', 'Tu teléfono se guardó correctamente.', 'success');
                    
                } catch (e) {
                    console.log("Error al verificar/actualizar teléfono en DB", e);
                    Swal.fire('Error', 'Hubo un problema al guardar tu número.', 'error');
                }
            }
        };

        async function cargarPerfilCRM() {
            try {
                const clienteRef = doc(db, "clientes", customerEmail);
                const clienteSnap = await getDoc(clienteRef);
                const phoneLocal = localStorage.getItem("customerPhone") || "";

                document.getElementById("displayPhone").innerHTML = `📱 ${phoneLocal || "Sin número"} <button class="edit-phone-btn" onclick="editarTelefono()">Editar</button>`;

                if (clienteSnap.exists()) {
                    const datos = clienteSnap.data();
                    
                    if (datos.telefono && !phoneLocal) {
                        localStorage.setItem("customerPhone", datos.telefono);
                        document.getElementById("displayPhone").innerHTML = `📱 ${datos.telefono} <button class="edit-phone-btn" onclick="editarTelefono()">Editar</button>`;
                    }

                    if(datos.nombre && datos.nombre !== customerName) {
                        localStorage.setItem("customerName", datos.nombre);
                        // CORRECCIÓN APLICADA AQUÍ
                        document.getElementById("textNombre").innerText = "👤 " + datos.nombre.trim().split(' ');
                    }

                    document.getElementById("displayPuntos").innerText = datos.puntos || 0;
                    document.getElementById("promoSwitch").checked = datos.suscrito_promos || false;

                    const historialDiv = document.getElementById("displayHistorial");
                    if (datos.historial && datos.historial.length > 0) {
                        let html = "";
                        datos.historial.slice().reverse().forEach(pedido => {
                            html += `
                                <div class="history-item">
                                    <h4 style="color: #267d46; margin: 0 0 5px 0;">${pedido.fecha}</h4>
                                    <p style="margin: 0 0 5px 0; font-size: 0.9em; color: #555;">${pedido.detalle}</p>
                                    <strong style="color: #d62f2f;">Total: $${pedido.total}</strong>
                                </div>
                            `;
                        });
                        historialDiv.innerHTML = html;
                    } else {
                        historialDiv.innerHTML = "<p style='text-align: center; color: #666;'>Aún no tienes pedidos registrados.</p>";
                    }

                } else {
                    document.getElementById("displayHistorial").innerHTML = "<p style='text-align: center; color: #666;'>Aún no tienes pedidos registrados en la nube.</p>";
                }
            } catch (error) {
                console.error("Error al cargar perfil:", error);
            }
        }

        document.getElementById("promoSwitch").addEventListener("change", async (e) => {
            const isChecked = e.target.checked;
            localStorage.setItem("promoSubscribed", isChecked ? "true" : "false");
            const clienteRef = doc(db, "clientes", customerEmail);
            
            try {
                await updateDoc(clienteRef, { suscrito_promos: isChecked });
                if(isChecked){
                    Swal.fire({ toast: true, position: 'top-end', icon: 'success', title: '¡Suscrito a promociones!', showConfirmButton: false, timer: 3000 });
                }
            } catch (error) {
                console.error("Error al actualizar preferencias:", error);
            }
        });

        window.canjearPuntos = () => {
            const puntosActuales = parseInt(document.getElementById("displayPuntos").innerText);
            if(puntosActuales >= 50) {
                Swal.fire('¡Felicidades!', 'Tienes suficientes puntos. Muestra este mensaje en caja o envíalo por WhatsApp con tu próximo pedido para reclamar tu jarra de agua.', 'success');
            } else {
                Swal.fire('Aún no', `Te faltan ${50 - puntosActuales} puntos. ¡Sigue disfrutando nuestra comida para acumular más!`, 'info');
            }
        };

        window.cerrarSesion = () => {
            Swal.fire({
                title: '¿Cerrar Sesión?',
                text: "Tendrás que volver a ingresar para hacer pedidos o usar puntos.",
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#d33',
                cancelButtonColor: '#3085d6',
                confirmButtonText: 'Sí, salir'
            }).then((result) => {
                if (result.isConfirmed) {
                    localStorage.removeItem("customerName");
                    localStorage.removeItem("customerEmail");
                    localStorage.removeItem("customerPhone");
                    localStorage.removeItem("promoSubscribed");
                    localStorage.removeItem("emailVerified");
                    localStorage.removeItem("verifyCode");
                    
                    Swal.fire({
                        toast: true,
                        position: 'bottom-start',
                        icon: 'success',
                        title: 'Sesión cerrada',
                        text: 'Vuelve pronto.',
                        showConfirmButton: false,
                        timer: 4000,
                        timerProgressBar: true
                    }).then(() => {
                        window.location.href = "index.html";
                    });
                }
            });
        };
    </script>
</body>
</html>
